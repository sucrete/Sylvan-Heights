    <link

  <body>
    <!-- header area start -->
    <header class="header-area-four header--sticky style-white">
      <my-header> </my-header>
      <div class="gradient-bg"></div>
    </header>
    <!-- header area end -->

    <!-- banner start -->
    <div
      class="banner-four-area banner-subpage course-layout-banner rts-section-gap jarallax"
      data-img-position="50% 130%"
    >
      <div class="overlay"></div>
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="banner-four-wrapper">
              <h1 class="title text-anim">Course</h1>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- banner end -->

    <section class="course-page-body mobile-padding">
      <div class="container">
        <!-- <div class="notices-wrapper">
          <div class="notices greens-fees">
            <p>
              Sylvan Heights amenities are nice, but the real star of the show
              is the 18 hole, 6264 yard municipal course. Our greens have
              multiple tee distances to accommodate players of all skill and age

        <div
          class="embla wow fadeInUp"
          data-wow-offset="120"
          data-wow-delay="1s"
        >
          <div class="embla__viewport">
            <div x-data="holesData" class="embla__container">
              <template x-for="hole in holes">
                <!-- * 'embla__slide' is the encapsulating element for each slide -->

                <div class="embla__slide">
                  <div class="embla__slide__wrapper p-4">
                    <div
                      class="row h-100 w-100 flex-column-reverse flex-md-row justify-content-between"
                    >
                      <div
                        class="details-side col-12 col-md-6 align-content-center justify-content-center"
                      >
                        <img
                          src="assets/images/icons/fleur-de-lis.svg"
                          alt=""
                          class="fdl injectable"
                        />
                        <h3>Hole <span x-text="hole.hole">1</span></h3>
                        <div class="par">
                          par <span x-text="hole.par">4</span>
                        </div>
                        <hr class="my-hr my-hr-2" />
                        <!-- <p class="hole-description" x-text="hole.description">
                          A tough opening hole requiring an accurate tee shot to
                          the right-center fairway; approach shot must avoid the
                          small, undulating green's large bunkers.
                        </p> -->
                        <div class="monospaced">
                          men's handicap:
                          <span x-text="hole.mensHandicap">4</span>
                        </div>
                        <hr class="my-hr my-hr-2" />
                        <template x-for="teeBox in hole.teeBoxes">
                          <div class="yardage pt-1">
                            <!-- <div
                              :class="teeBox.teeBox"
                              class="yardage-circle"
                            ></div> -->
                            <span x-text="teeBox.teeBox"></span>:&nbsp;
                            <span x-text="teeBox.yardage">777</span>&nbsp;yards
                          </div>
                        </template>
                      </div>
                      <div class="col-12 col-md-6 pic-side">
                        <div class="course-image-container">
                          <img :src="hole.pictureURL" alt="" />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div class="embla-thumbs">
            <div class="embla-thumbs__viewport">
              <div class="embla-thumbs__container">
                <div
                  class="embla-thumbs__slide one embla-thumbs__slide--selected"
                >
                  <button type="button" class="embla-thumbs__slide__number">
                    Hole 1
                  </button>
                </div>
                <div class="embla-thumbs__slide">
                  <button type="button" class="embla-thumbs__slide__number">

                <div class="embla-thumbs__slide">

                <div class="embla-thumbs__slide">

              </div>
            </div>
          </div>
        </div>
      </div>
